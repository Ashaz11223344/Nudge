name: Build iOS IPAs (Fresh)

on:
  workflow_dispatch:

jobs:
  build:
    name: Build & Artifact iOS (Manual)
    runs-on: macos-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Set FLUTTER_ROOT
        run: echo "FLUTTER_ROOT=$(dirname $(dirname $(which flutter)))" >> $GITHUB_ENV

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true
          working-directory: ios

      - name: Install CocoaPods (Stable)
        run: |
          sudo gem uninstall cocoapods -a -x || true
          sudo gem install cocoapods -v 1.16.2
          pod --version

      - name: Install dependencies (FINAL FIX)
        run: |
          flutter clean
          flutter pub get
          flutter precache --ios
          
          # Generate iOS files (required before pod install)
          flutter build ios --debug --no-codesign
          
          cd ios
          pod deintegrate
          pod install
          cd ..

      - name: Build Unsigned IPA (FIXED)
        run: |
          # 1. Ensure Flutter iOS build step is included
          flutter build ios --release --no-codesign

          # 6. Add debug logs
          echo "DEBUG: Contents of build/ios/iphoneos"
          ls -al build/ios/iphoneos

          # 2. Verify Runner.app exists
          if [ ! -d "build/ios/iphoneos/Runner.app" ]; then
            echo "Error: build/ios/iphoneos/Runner.app does not exist!"
            exit 1
          fi
          echo "Success: Runner.app exists. Proceeding..."

          # 3. Create correct IPA structure
          rm -rf Payload nudge.ipa
          mkdir Payload
          cp -r build/ios/iphoneos/Runner.app Payload/

          # 6. Add debug logs - ls Payload
          echo "DEBUG: Contents of Payload"
          ls -al Payload

          # 4. Package IPA properly
          # Note: We zip the 'Payload' directory itself (not its contents) 
          # to ensure it has a valid IPA structure for sideloading.
          zip -r nudge.ipa Payload
          
          echo "DEBUG: Ensure nudge.ipa was created"
          ls -lah nudge.ipa

      - name: Inject Team ID
        run: |
          sed -i '' "s/USER_TEAM_ID/${{ secrets.APPLE_TEAM_ID }}/g" ios/Runner.xcodeproj/project.pbxproj

      - name: Build and Sign IPA (Development)
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APP_STORE_CONNECT_API_KEY_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_API_KEY_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_KEY: ${{ secrets.APP_STORE_CONNECT_KEY_CONTENT }}
        run: |
          cd ios
          bundle exec fastlane build

      - name: Upload IPAs
        uses: actions/upload-artifact@v4
        with:
          name: nudge-ios-artifacts-manual
          if-no-files-found: error
          path: |
            nudge.ipa
            build/ios/ipa/Nudge.ipa
