name: Build iOS IPAs (Fresh)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.0'
          bundler-cache: false

      - name: Install CocoaPods
        run: gem install cocoapods -v 1.15.2 --no-document

      - name: Setup FLUTTER_ROOT
        run: echo "FLUTTER_ROOT=$(dirname $(dirname $(which flutter)))" >> $GITHUB_ENV

      - name: Install Flutter dependencies
        run: |
          flutter clean
          flutter pub get
          flutter precache --ios

      - name: Build and install pods
        run: |
          # Generate the Xcode project (without codesigning)
          flutter build ios --debug --no-codesign

          cd ios
          # Clean any previous pods
          rm -rf Pods Podfile.lock
          pod install --repo-update
          cd ..

      - name: Build IPA
        run: |
          flutter build ios --release --no-codesign

          mkdir Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r nudge.ipa Payload

      - uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: nudge.ipa