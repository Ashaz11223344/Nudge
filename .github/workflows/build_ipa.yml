name: Build iOS IPAs (Fresh)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Setup FLUTTER_ROOT
        run: echo "FLUTTER_ROOT=$(dirname $(dirname $(which flutter)))" >> $GITHUB_ENV

      - name: Install CocoaPods (FORCED FIX)
        run: |
          sudo gem uninstall cocoapods -a -x || true
          sudo gem install cocoapods -v 1.15.2

          export PATH="/usr/local/bin:/usr/bin:$PATH"

          which pod
          pod --version

      - name: Install dependencies
        run: |
          export FLUTTER_ROOT=$(dirname $(dirname $(which flutter)))

          flutter clean
          flutter pub get
          flutter precache --ios
          flutter build ios --debug --no-codesign

          cd ios
          export PATH="/usr/local/bin:/usr/bin:$PATH"
          pod deintegrate
          rm -rf Pods Podfile.lock
          pod install
          cd ..

      - name: Build IPA
        run: |
          flutter build ios --release --no-codesign

          mkdir Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r nudge.ipa Payload

      - uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: nudge.ipa