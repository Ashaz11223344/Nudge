name: iOS Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Setup CocoaPods 1.15.2 (System Ruby)
        run: |
          brew uninstall cocoapods || true
          gem uninstall cocoapods -a || true
          sudo gem install cocoapods -v 1.15.2 -n /usr/local/bin
          pod --version

      - name: Prepare Flutter iOS Build
        run: |
          flutter clean
          flutter pub get
          flutter precache --ios
          flutter build ios --debug --no-codesign

      - name: Clean and Install CocoaPods
        run: |
          cd ios
          pod deintegrate
          rm -rf Pods Podfile.lock
          pod install

      - name: Final iOS Release Build
        run: flutter build ios --release --no-codesign

      - name: Package IPA
        run: |
          mkdir Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r Nudge.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Nudge.ipa
          path: Nudge.ipa