name: iOS Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Setup FLUTTER_ROOT
        run: echo "FLUTTER_ROOT=$(dirname $(dirname $(which flutter)))" >> $GITHUB_ENV

      - name: Install Pods (FORCE FIX)
        run: |
          export FLUTTER_ROOT=$(dirname $(dirname $(which flutter)))

          flutter clean
          flutter pub get
          flutter precache --ios
          flutter build ios --debug --no-codesign

          cd ios

          # remove old pods
          rm -rf Pods Podfile.lock

          # 👇 THIS IS THE MAGIC FIX
          sudo gem install cocoapods -v 1.15.2

          sudo ruby -S pod deintegrate || true
          sudo ruby -S pod install


      - name: Install dependencies
        run: |
          export FLUTTER_ROOT=$(dirname $(dirname $(which flutter)))

          flutter clean
          flutter pub get
          flutter precache --ios
          flutter build ios --debug --no-codesign

          cd ios
          export PATH="/usr/local/bin:/usr/bin:$PATH"
          pod deintegrate
          rm -rf Pods Podfile.lock
          pod install
          cd ..

      - name: Build IPA
        run: |
          flutter build ios --release --no-codesign

          mkdir Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r Nudge.ipa Payload

      - uses: actions/upload-artifact@v4
        with:
          name: ios-build
          path: Nudge.ipa