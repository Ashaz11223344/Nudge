name: iOS Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build & Artifact iOS
    runs-on: macos-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Set FLUTTER_ROOT
        run: echo "FLUTTER_ROOT=$(dirname $(dirname $(which flutter)))" >> $GITHUB_ENV

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true
          working-directory: ios

      - name: Install CocoaPods (Stable)
        run: |
          sudo gem uninstall cocoapods -a -x || true
          sudo gem install cocoapods -v 1.16.2
          pod --version

      - name: Install dependencies (FINAL FIX)
        run: |
          flutter clean
          flutter pub get
          flutter precache --ios
          
          # Generate iOS files (required before pod install)
          flutter build ios --debug --no-codesign
          
          cd ios
          pod deintegrate
          pod install
          cd ..

      - name: Build Unsigned IPA
        run: |
          flutter build ios --release --no-codesign
          cd build/ios/iphoneos
          mkdir -p Payload
          cp -r Runner.app Payload/
          zip -r ../../Nudge-Unsigned.ipa Payload
          cd ../../..

      - name: Inject Team ID
        run: |
          sed -i '' "s/USER_TEAM_ID/${{ secrets.APPLE_TEAM_ID }}/g" ios/Runner.xcodeproj/project.pbxproj

      - name: Build and Sign IPA (Development)
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APP_STORE_CONNECT_API_KEY_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_API_KEY_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_KEY: ${{ secrets.APP_STORE_CONNECT_KEY_CONTENT }}
        run: |
          cd ios
          bundle exec fastlane build

      - name: Upload IPAs
        uses: actions/upload-artifact@v4
        with:
          name: nudge-ios-artifacts
          path: |
            build/Nudge-Unsigned.ipa
            build/ios/ipa/Nudge.ipa
