name: nudge
description: "Nudge - Offline Motivational Quotes App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.2
  shared_preferences: ^2.3.4
  flutter_local_notifications: ^18.0.1
  timezone: ^0.9.4
  image_picker: ^1.1.2
  share_plus: ^10.1.4
  path_provider: ^2.1.5
  intl: ^0.20.2
  uuid: ^4.5.1
  home_widget: ^0.7.0
  flutter_timezone: ^5.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/quotes/quotes.txt
    - assets/icons/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/icon.jpg"

